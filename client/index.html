<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Agents Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#F5F3FF',
              100: '#EDE9FE',
              200: '#DDD6FE',
              300: '#C4B5FD',
              400: '#A78BFA',
              500: '#7C3AED',
              600: '#6D28D9',
              700: '#5B21B6',
              800: '#4C1D95',
              900: '#2E1065',
            },
            sidebar: '#1E1B2E',
            'sidebar-hover': '#2D2A3E',
            'sidebar-active': '#3D3A4E',
            surface: '#FFFFFF',
            muted: '#F8F9FA',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white min-h-screen">
  <div id="root"></div>
  <script src="/lib/shared.js"></script>
  <script type="text/babel" src="/components/Header.js"></script>
  <script type="text/babel" src="/components/AgentList.js"></script>
  <script type="text/babel" src="/components/AgentForm.js"></script>
  <script type="text/babel" src="/components/ChatBrowser.js"></script>
  <script type="text/babel" src="/components/ConversationViewer.js"></script>
  <script type="text/babel" src="/components/ApprovalQueue.js"></script>
  <script type="text/babel" src="/components/SettingsPage.js"></script>
  <script type="text/babel" src="/components/PipelineView.js"></script>
  <script type="text/babel" src="/components/SummariesPage.js"></script>
  <script type="text/babel" src="/app.js"></script>
</body>
</html>
